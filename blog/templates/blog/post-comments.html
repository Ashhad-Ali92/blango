{% load crispy_forms_tags %}

<div class="row mt-4">
    <div class="col-md-8">

        {% if request.user.is_authenticated %}

            <h4 class="mb-3">Add Comment</h4>

            {% crispy comment_form %}

        {% else %}

            <div class="alert alert-info">
                Please <a href="{% url 'login' %}">login</a> to add a comment.
            </div>

        {% endif %}

    </div>
</div>
